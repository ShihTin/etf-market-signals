name: Daily ETF Market Signals

on:
  schedule:
    - cron: '30 11 * * *'   # UTC 11:00 = 台灣晚上 19:00
  workflow_dispatch:       # 允許手動測試

jobs:
  run_signals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run ETF Signals
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/etf_signals.py
